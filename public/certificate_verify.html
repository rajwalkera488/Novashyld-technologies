<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShyld | Certificate Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: #020617;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* ===== CYBER GRID BACKGROUND ===== */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,234,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,234,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:0;
}

/* ===== GLOW ===== */
body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00eaff;
    filter:blur(120px);
    opacity:0.2;
    top:20%;
    left:30%;
}

/* ===== MAIN CARD ===== */
.container{
    width:520px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(25px);
    border:1px solid rgba(0,234,255,0.2);
    box-shadow:0 0 60px rgba(0,234,255,0.08);
    text-align:center;
    z-index:2;
}

/* ===== LOGO ===== */
.logo{
    width:180px;
    margin-bottom:15px;
}

/* HEADER */
h2{
    font-size:22px;
    color:#38bdf8;
}

.sub{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    margin-top:10px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border:1px solid #00eaff;
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.verify{
    background:linear-gradient(135deg,#00eaff,#3b82f6);
    color:black;
}

.clear{
    background:#ef4444;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00eaff;
}

/* LOADER */
.loader{
    display:none;
    margin-top:20px;
}

.loader span{
    display:inline-block;
    width:10px;
    height:10px;
    background:#00eaff;
    border-radius:50%;
    margin:0 4px;
    animation:jump 0.6s infinite alternate;
}

@keyframes jump{
    to{transform:translateY(-10px);}
}

/* RESULT CARD */
.result{
    display:none;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    animation:fadeIn 0.5s ease;
}

.row{
    margin:8px 0;
    font-size:14px;
}

/* BADGES */
.badge{
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.valid{ background:#22c55e; color:black; }
.invalid{ background:#ef4444; }

/* DOMAIN COLORS */
.domain{
    padding:4px 10px;
    border-radius:20px;
    font-weight:bold;
}

.ethical{background:#22c55e;}
.web{background:#3b82f6;}
.network{background:#f59e0b; color:black;}
.bug{background:#ef4444;}

/* ERROR */
.error{
    margin-top:10px;
    color:#ef4444;
    font-size:13px;
}

/* FOOTER */
.footer{
    position:absolute;
    bottom:15px;
    font-size:12px;
    color:#64748b;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">


<h2>Certificate Verification</h2>
<p class="sub">Securely verify NovaShyld certificates</p>

<input type="text" id="ticket" placeholder="Enter Ticket ID (NS-XXXXX)">

<button class="btn verify" onclick="verifyCert()">Verify Certificate</button>
<button class="btn clear" onclick="clearData()">Clear</button>

<div class="error" id="errorMsg"></div>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<!-- RESULT -->
<div class="result" id="resultBox"></div>

</div>

<div class="footer">© 2026 NovaShyld Technologies</div>

<script>

function getDomainClass(domain){

    switch(domain){
        case "Ethical Hacking & Pentesting": return "ethical";
        case "Web Application Security": return "web";
        case "Web Development": return "webdev";
        case "Network Security": return "network";
        case "Bug Bounty": return "bug";
        case "VAPT": return "vapt";
        default: return "bug";
    }
}

async function verifyCert(){

    let ticket = document.getElementById("ticket").value.trim().toUpperCase();
    let loader = document.getElementById("loader");
    let resultBox = document.getElementById("resultBox");
    let errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";
    resultBox.style.display="none";

    if(!/^NS-\d{5,6}$/.test(ticket)){
        errorMsg.innerText = "⚠ Invalid Ticket Format (Use NS-XXXXX)";
        return;
    }

    loader.style.display="block";

    try{
        let res = await fetch(`/verify-certificate/${ticket}`);
        let data = await res.json();

        loader.style.display="none";

        if(data.valid){

            let domainClass = getDomainClass(data.domain);

            resultBox.innerHTML = `
                <div class="row"><b>Name:</b> ${data.name}</div>
                <div class="row"><b>Ticket:</b> ${data.ticket}</div>
                <div class="row"><b>Domain:</b> <span class="domain ${domainClass}">${data.domain}</span></div>
                <div class="row"><b>Date:</b> ${data.date}</div>
                <div class="row"><b>Status:</b> <span class="badge valid">Verified</span></div>
            `;

        } else {

            resultBox.innerHTML = `
                <div class="row" style="color:#ef4444;">
                ❌ Invalid Certificate
                </div>
            `;
        }

        resultBox.style.display="block";

    } catch(err){
        loader.style.display="none";
        errorMsg.innerText = "⚠ Server Error";
        console.log(err);
    }
}

function clearData(){
    document.getElementById("ticket").value="";
    document.getElementById("resultBox").style.display="none";
    document.getElementById("errorMsg").innerText="";
}

</script>

</body>
</html>
