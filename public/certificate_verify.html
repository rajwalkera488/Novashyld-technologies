<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaShyld | Certificate Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg:             #0a0e14;
            --bg-elevated:    #11151c;
            --steel-line:     #232a36;
            --primary:        #3b82f6;
            --primary-bright: #60a5fa;
            --primary-deep:   #1d4ed8;
            --accent-soft:    #93c5fd;
            --success:        #22c55e;
            --danger:         #ef4444;
            --warning:        #f59e0b;
            --text:           #e8eaed;
            --text-dim:       #9aa4b2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { overflow-x: hidden; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
            position: relative;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            opacity: 0.45;
            pointer-events: none;
        }

        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: rgba(10,14,20,.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--steel-line);
        }

        .navbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--primary-bright);
            text-decoration: none;
        }

        .navbar img { height: 36px; }

        .navbar .back-link {
            font-size: 13px;
            color: var(--text-dim);
            text-decoration: none;
            transition: .25s;
        }

        .navbar .back-link:hover { color: var(--primary-bright); }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            margin-top: 70px;
            background: rgba(17,21,28,.88);
            border: 1px solid rgba(59,130,246,.22);
            border-radius: 22px;
            padding: 42px 38px 36px;
            backdrop-filter: blur(22px);
            box-shadow:
                0 0 60px rgba(59,130,246,.1),
                inset 0 0 40px rgba(59,130,246,.04);
            animation: cardIn .5s cubic-bezier(.2,.8,.2,1.1);
        }

        @keyframes cardIn {
            from { opacity:0; transform:translateY(22px) scale(.96); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-radius: 2px;
        }

        .card-header { text-align: center; margin-bottom: 28px; }

        .shield-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px; height: 68px;
            background: rgba(59,130,246,.1);
            border: 1px solid rgba(59,130,246,.3);
            border-radius: 50%;
            font-size: 30px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 14px rgba(59,130,246,.4));
        }

        .card-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card-header p { font-size: 13px; color: var(--text-dim); }

        .input-wrap { position: relative; margin-bottom: 14px; }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border-radius: 12px;
            border: 1px solid var(--steel-line);
            background: rgba(255,255,255,.04);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: .3s;
            letter-spacing: .5px;
        }

        .input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 18px rgba(59,130,246,.28);
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            color: var(--text-dim);
            pointer-events: none;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-top: 4px;
        }

        .btn {
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: .3s;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,.3), transparent);
            transition: .5s;
        }

        .btn:hover::before { left: 100%; }

        .btn-verify {
            background: linear-gradient(90deg, var(--primary), var(--primary-deep));
            color: #02131a;
        }

        .btn-verify:hover {
            box-shadow: 0 0 22px rgba(59,130,246,.5);
            transform: translateY(-2px);
        }

        .btn-clear {
            background: rgba(239,68,68,.15);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,.35);
            padding: 13px 18px;
        }

        .btn-clear:hover {
            background: rgba(239,68,68,.25);
            transform: translateY(-2px);
        }

        .loader {
            display: none;
            justify-content: center;
            gap: 7px;
            margin-top: 20px;
        }

        .loader span {
            display: inline-block;
            width: 9px; height: 9px;
            background: var(--primary-bright);
            border-radius: 50%;
            animation: bounce .7s ease-in-out infinite alternate;
        }

        .loader span:nth-child(2) { animation-delay: .2s; }
        .loader span:nth-child(3) { animation-delay: .4s; }

        @keyframes bounce { to { transform: translateY(-10px); opacity: .5; } }

        .error-msg {
            color: var(--danger);
            font-size: 12.5px;
            min-height: 18px;
            margin-top: 8px;
        }

        .result { display: none; margin-top: 24px; border-radius: 14px; overflow: hidden; animation: slideUp .45s ease; }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .result-valid   { background: rgba(34,197,94,.06);  border: 1px solid rgba(34,197,94,.3); }
        .result-invalid { background: rgba(239,68,68,.06);  border: 1px solid rgba(239,68,68,.3); }

        .result-header-valid {
            background: rgba(34,197,94,.12);
            border-bottom: 1px solid rgba(34,197,94,.25);
            padding: 14px 20px;
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 14px;
            color: var(--success);
        }

        .result-header-invalid {
            background: rgba(239,68,68,.12);
            border-bottom: 1px solid rgba(239,68,68,.25);
            padding: 14px 20px;
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 14px;
            color: var(--danger);
        }

        .result-body { padding: 20px; }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,.06);
            font-size: 13.5px;
            gap: 12px;
        }

        .result-row:last-child { border-bottom: none; }

        .result-row .label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .8px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .result-row .value { color: var(--text); font-weight: 500; text-align: right; word-break: break-word; }

        .domain-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .domain-cyber  { background:rgba(59,130,246,.2);  color:var(--primary-bright); border:1px solid rgba(59,130,246,.4); }
        .domain-web    { background:rgba(59,130,246,.2);  color:var(--primary-bright); border:1px solid rgba(59,130,246,.4); }
        .domain-ethical{ background:rgba(34,197,94,.2);   color:#4ade80;               border:1px solid rgba(34,197,94,.4); }
        .domain-network{ background:rgba(245,158,11,.2);  color:var(--warning);        border:1px solid rgba(245,158,11,.4); }
        .domain-bug    { background:rgba(239,68,68,.2);   color:#f87171;               border:1px solid rgba(239,68,68,.4); }
        .domain-vapt   { background:rgba(168,85,247,.2);  color:#d8b4fe;               border:1px solid rgba(168,85,247,.4); }
        .domain-default{ background:rgba(100,116,139,.2); color:#94a3b8;               border:1px solid rgba(100,116,139,.4); }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,.15);
            color: var(--success);
            border: 1px solid rgba(34,197,94,.4);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .ticket-mono {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--primary-bright);
            letter-spacing: .5px;
        }

        .page-footer {
            position: relative;
            z-index: 2;
            margin-top: 28px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        @media (max-width: 560px) {
            .navbar { padding: 10px 18px; }
            .navbar .brand span { display: none; }
            .container { padding: 32px 22px 28px; margin-top: 65px; }
            .card-header h2 { font-size: 18px; }
            .btn-row { grid-template-columns: 1fr; }
            .result-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .result-row .value { text-align: left; }
        }

    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <nav class="navbar">
        <a href="index.html" class="brand">
            <img src="images/logo.png" alt="NovaShyld logo">
            <span>NovaShyld Technologies</span>
        </a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="container">

        <div class="card-header">
            <div class="shield-wrap">🛡️</div>
            <h2>Certificate Verification</h2>
            <p>Securely verify NovaShyld internship certificates</p>
        </div>

        <div class="input-wrap">
            <span class="input-icon">🎫</span>
            <input type="text" id="ticket"
                placeholder="Enter Ticket ID (NS-AB1234)"
                onkeydown="if(event.key==='Enter') verifyCert()">
        </div>

        <div class="btn-row">
            <button class="btn btn-verify" onclick="verifyCert()">🔍 Verify Certificate</button>
            <button class="btn btn-clear"  onclick="clearData()">✕ Clear</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loader" id="loader">
            <span></span><span></span><span></span>
        </div>

        <div class="result" id="resultBox"></div>

    </div>

    <div class="page-footer">© 2026 NovaShyld Technologies | Learn. Build. Secure.</div>


    <script>

    /* =========================
       PARTICLE NETWORK
    ========================= */

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createParticles() {

        particles = [];

        const total = window.innerWidth < 768 ? 45 : 80;

        for (let i = 0; i < total; i++) {

            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                radius: Math.random() * 2 + 1
            });

        }
    }

    resizeCanvas();
    createParticles();

    window.addEventListener("resize", () => {
        resizeCanvas();
        createParticles();
    });

    function animateParticles() {

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {

            p.x += p.vx;
            p.y += p.vy;

            if (p.x <= 0 || p.x >= canvas.width) p.vx *= -1;
            if (p.y <= 0 || p.y >= canvas.height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#3b82f6";
            ctx.fill();

        });

        for (let i = 0; i < particles.length; i++) {

            for (let j = i + 1; j < particles.length; j++) {

                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;

                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 120) {

                    ctx.beginPath();

                    ctx.strokeStyle =
                        `rgba(59,130,246,${0.15 * (1 - distance / 120)})`;

                    ctx.lineWidth = 1;

                    ctx.moveTo(particles[i].x, particles[i].y);

                    ctx.lineTo(particles[j].x, particles[j].y);

                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(animateParticles);
    }

    animateParticles();

    /* =========================
       DOMAIN BADGES
    ========================= */

    function domainClass(domain) {

        if (!domain) return "domain-default";

        const d = domain.toLowerCase();

        if (
            d.includes("cybersecurity") ||
            d.includes("security analyst")
        ) {
            return "domain-cyber";
        }

        if (
            d.includes("ethical") ||
            d.includes("penetration") ||
            d.includes("pentest")
        ) {
            return "domain-ethical";
        }

        if (d.includes("web")) {
            return "domain-web";
        }

        if (d.includes("network")) {
            return "domain-network";
        }

        if (d.includes("bug")) {
            return "domain-bug";
        }

        if (d.includes("vapt")) {
            return "domain-vapt";
        }

        return "domain-default";
    }

    /* =========================
       VERIFY CERTIFICATE
    ========================= */

    async function verifyCert() {

        const input = document.getElementById("ticket");

        const loader = document.getElementById("loader");

        const resultBox = document.getElementById("resultBox");

        const errorMsg = document.getElementById("errorMsg");

        const ticket = input.value.trim().toUpperCase();

        errorMsg.innerText = "";

        resultBox.style.display = "none";

        resultBox.innerHTML = "";

        /* =========================
           VALIDATION
        ========================= */

        if (!ticket) {

            errorMsg.innerText =
                "⚠ Please enter your Ticket ID.";

            return;
        }

        // Supports BOTH:
        // NS-AB1234
        // NS-123456

        const newFormat = /^NS-[A-Z]{2}\d{4}$/;
        const oldFormat = /^NS-\d{6}$/;

        if (
            !newFormat.test(ticket) &&
            !oldFormat.test(ticket)
        ) {

            errorMsg.innerText =
                "⚠ Invalid Ticket ID format.";

            return;
        }

        /* =========================
           SHOW LOADER
        ========================= */

        loader.style.display = "flex";

        try {

            const response =
                await fetch(`/verify-certificate/${ticket}`);

            const data = await response.json();

            loader.style.display = "none";

            /* =========================
               VALID CERTIFICATE
            ========================= */

            if (data.valid) {

                const badgeClass =
                    domainClass(data.domain);

                resultBox.innerHTML = `

                <div class="result-valid">

                    <div class="result-header-valid">
                        ✅ Certificate Verified
                    </div>

                    <div class="result-body">

                        <div class="result-row">
                            <span class="label">Name</span>
                            <span class="value">
                                ${data.name || "N/A"}
                            </span>
                        </div>

                        <div class="result-row">
                            <span class="label">Ticket ID</span>
                            <span class="value ticket-mono">
                                ${data.ticket || ticket}
                            </span>
                        </div>

                        <div class="result-row">
                            <span class="label">Program</span>
                            <span class="value">
                                <span class="domain-badge ${badgeClass}">
                                    ${data.domain || "N/A"}
                                </span>
                            </span>
                        </div>

                        <div class="result-row">
                            <span class="label">Issued Date</span>
                            <span class="value">
                                ${data.date || "—"}
                            </span>
                        </div>

                        <div class="result-row">
                            <span class="label">Status</span>

                            <span class="value">

                                <span class="verified-badge">
                                    ✓ Authentic & Valid
                                </span>

                            </span>
                        </div>

                    </div>

                </div>
                `;

            }

            /* =========================
               INVALID CERTIFICATE
            ========================= */

            else {

                resultBox.innerHTML = `

                <div class="result-invalid">

                    <div class="result-header-invalid">
                        ❌ Certificate Not Found
                    </div>

                    <div class="result-body">

                        <div class="result-row">

                            <span class="label">
                                Ticket ID
                            </span>

                            <span class="value ticket-mono">
                                ${ticket}
                            </span>

                        </div>

                        <div class="result-row">

                            <span class="label">
                                Status
                            </span>

                            <span class="value"
                                style="color: var(--danger);">

                                This certificate does not exist
                                in NovaShyld records.

                            </span>

                        </div>

                    </div>

                </div>
                `;
            }

            resultBox.style.display = "block";

        }

        catch (error) {

            loader.style.display = "none";

            errorMsg.innerText =
                "⚠ Server error. Please try again.";

            console.error(error);
        }
    }

    /* =========================
       CLEAR DATA
    ========================= */

    function clearData() {

        document.getElementById("ticket").value = "";

        document.getElementById("resultBox").style.display =
            "none";

        document.getElementById("resultBox").innerHTML = "";

        document.getElementById("errorMsg").innerText = "";
    }

</script>

</body>
</html>
