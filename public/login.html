<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaShyld | Intern Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0a0f1c, #020617);
    color:white;
}

/* Animated background glow */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00eaff;
    filter:blur(120px);
    opacity:0.2;
    animation: move 6s infinite alternate;
}

@keyframes move{
    from{ transform:translate(-100px,-100px);}
    to{ transform:translate(100px,100px);}
}

/* Card */
.login-box{
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    border:1px solid rgba(255,255,255,0.1);
}

/* Title */
.login-box h2{
    margin-bottom:20px;
    color:#00eaff;
}

/* Inputs */
.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#0f172a;
    color:white;
    font-size:14px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#00eaff,#0066ff);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Loading state */
button.loading{
    opacity:0.6;
    pointer-events:none;
}

/* Error message */
#error{
    margin-top:15px;
    color:#ff4d4d;
    font-size:13px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>NovaShyld Login</h2>

<div class="input-box">
<input type="email" id="email" placeholder="Enter Email">
</div>

<div class="input-box">
<input type="text" id="ticket" placeholder="Enter Ticket ID">
</div>

<button id="loginBtn" onclick="login()">Login</button>

<div id="error"></div>

</div>

<script>

async function login(){

const email = document.getElementById("email").value;
const ticket = document.getElementById("ticket").value;
const btn = document.getElementById("loginBtn");
const errorBox = document.getElementById("error");

errorBox.innerText = "";

if(email === "" || ticket === ""){
errorBox.innerText = "Enter Email and Ticket ID";
return;
}

btn.innerText = "Checking...";
btn.classList.add("loading");

try{

const res = await fetch("/intern-login",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({ email, token: ticket })
});

const data = await res.json();

if(data.success){

sessionStorage.setItem("internEmail", email);
sessionStorage.setItem("internTicket", ticket);

window.location = "index.html";

}else{
errorBox.innerText = "Invalid Email or Ticket ID";
}

}catch{
errorBox.innerText = "Server error. Try again.";
}

btn.innerText = "Login";
btn.classList.remove("loading");

}

</script>

</body>
</html>
